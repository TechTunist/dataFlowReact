<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Vite entry HTML (for `npm run dev:vite` / `build:vite`).
         MODERN AGENT: created for incremental Vite migration.
         CRA continues to use public/index.html exclusively.
         %PUBLIC_URL% replaced with root paths (Vite serves /public/* at /).
         Script entry added for Vite module bundling.
         See vite.config.js for details. Do not delete; supports parallel Vite path.
    -->
    <link rel="icon" href="/cryptological-logo.ico" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Cryptological. A tool currently under development with the goal of helping to bring improved understanding to a confusing sector."
    />
    <link rel="apple-touch-icon" href="/cryptological-logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Cryptological</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!-- Vite will process and inject optimized module script(s) here; explicit for clarity -->
    <script type="module" src="/src/index.js"></script>
    <!--
      This is the Vite-specific index.html (root of project).
      CRA build ignores this and uses public/index.html + react-scripts injection.
      Both paths must produce equivalent app.
    -->
  </body>
</html>
